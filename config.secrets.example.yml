# Copy to config.secrets.yml, fill values, then encrypt:
#   sops --encrypt --age age1YOURPUBLICKEY... config.secrets.yml > config.secrets.enc.yml
auth:
  authentik:
    postgres_password: change-me-strong-random
    secret_key: change-me-long-random-secret
    # Only applied on first startup with empty Postgres data (see scripts/reset-authentik-db.sh)
    bootstrap_email: admin@rust-infra.de
    bootstrap_password: change-me-akadmin-password
apps:
  static:
    auth_demos:
      oidc:
        client_id: auth-oidc-demo
        client_secret: change-me-oidc-client-secret
        session_secret: change-me-oidc-session-secret-min-32-chars
      jwt_api:
        client_id: auth-jwt-api-demo
        client_secret: change-me-jwt-api-client-secret
      demo_users:
        demo_user_password: change-me-demo-user
        ops_user_password: change-me-ops-user
