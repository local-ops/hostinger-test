version: "3"

tasks:
  default:
    desc: List all tasks
    silent: true
    cmds:
      - task --list

  install:
    desc: Install Node dependencies (npm ci, requires package-lock.json)
    cmds:
      - npm ci

  dev:
    desc: Run Eleventy dev server with live reload (run install first if needed)
    cmds:
      - npm run dev

  build:
    desc: Build static site into _site
    cmds:
      - npm run build

  clean:
    desc: Remove Eleventy output directory _site
    cmds:
      - rm -rf _site
