version: "3"

tasks:
  init:
    desc: Create data/, backup/, and config/ directory trees in repo root
    cmds:
      - |
        set -euo pipefail
        DATA="{{.DATA_ROOT}}"
        BACKUP="{{.BACKUP_ROOT}}"
        SVC_CFG="{{.SERVICE_CONFIG_ROOT}}"
        for layer in proxy auth secrets files apps monitoring; do
          mkdir -p "$DATA/$layer" "$BACKUP/$layer" "$SVC_CFG/$layer"
        done
        mkdir -p \
          "$DATA/proxy/traefik/letsencrypt" \
          "$DATA/auth/postgres" \
          "$DATA/auth/redis" \
          "$DATA/auth/authentik/media" \
          "$DATA/auth/authentik/templates" \
          "$DATA/apps/n8n" \
          "$SVC_CFG/proxy/traefik" \
          "$SVC_CFG/auth/authentik" \
          "$SVC_CFG/auth/postgresql" \
          "$SVC_CFG/auth/redis" \
          "$SVC_CFG/apps/n8n" \
          "$SVC_CFG/apps/ai-consult-web"
        bash ./scripts/fix-data-permissions.sh
        echo "system:init created data/, backup/, config/ under {{.ROOT_DIR}}"

  fix-data-permissions:
    desc: Verify and fix ownership on data/ bind mounts (recursive; run each deploy)
    dir: "{{.ROOT_DIR}}"
    env:
      SBS_FIX_PERMS_STRICT: "1"
    cmds:
      - bash ./scripts/fix-data-permissions.sh

  export-config:
    desc: Flatten config.yml (+ SOPS secrets only, no local files) into .env
    env:
      SBS_EXPORT_LOCAL: "0"
    cmds:
      - ./scripts/export_config.sh

  secrets-export:
    desc: Decrypt config.secrets.enc.yml and merge into .env (requires sops)
    cmds:
      - |
        set -euo pipefail
        ENC="{{.ROOT_DIR}}/config.secrets.enc.yml"
        TMP="{{.ROOT_DIR}}/.secrets.tmp.yaml"
        STAMP="{{.ROOT_DIR}}/.secrets.enc.stamp"
        if [[ ! -f "$ENC" ]]; then
          echo "secrets-export: missing $ENC — see config.secrets.example.yml"
          exit 1
        fi
        sops -d "$ENC" > "$TMP"
        ./scripts/export_config.sh
        rm -f "$TMP"
        sha256sum "$ENC" | awk '{print $1}' > "$STAMP"
        echo "secrets-export: updated .env and stamp"

  export-config-if-needed:
    desc: Re-export secrets when config.secrets.enc.yml changed
    internal: true
    cmds:
      - |
        set -euo pipefail
        ENC="{{.ROOT_DIR}}/config.secrets.enc.yml"
        STAMP="{{.ROOT_DIR}}/.secrets.enc.stamp"
        if [[ ! -f "$ENC" ]]; then
          task system:export-config
          exit 0
        fi
        current="$(sha256sum "$ENC" | awk '{print $1}' 2>/dev/null || shasum -a 256 "$ENC" | awk '{print $1}')"
        if [[ ! -f "$STAMP" ]] || [[ "$(cat "$STAMP")" != "$current" ]]; then
          task system:secrets-export
        else
          task system:export-config
        fi

  start:
    desc: init, export .env when secrets changed, docker compose up -d --build
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: init
      - task: export-config-if-needed
      - task: fix-data-permissions
      - docker compose up -d --build

  deploy:
    desc: CI/prod deploy — init, always refresh .env from secrets, compose up
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: init
      - |
        set -euo pipefail
        ENC="{{.ROOT_DIR}}/config.secrets.enc.yml"
        if [[ -f "$ENC" ]]; then
          task system:secrets-export
        else
          task system:export-config
        fi
      - task: fix-data-permissions
      - docker compose up -d --build

  stop:
    desc: Stop all sbs services
    dir: "{{.ROOT_DIR}}"
    cmds:
      - docker compose down

  pull:
    desc: Pull images for all services
    dir: "{{.ROOT_DIR}}"
    cmds:
      - docker compose pull

  bootstrap-host:
    desc: Debian host packages, go-task, yq, sops, oh-my-zsh (idempotent)
    cmds:
      - bash ./scripts/bootstrap-host.sh

  reset-authentik-db:
    desc: "DESTRUCTIVE: wipe Authentik postgres/redis/media and restart (needs bootstrap in secrets)"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: secrets-export
      - bash ./scripts/reset-authentik-db.sh --yes
