services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    networks:
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      # Public hostname: ${TRAEFIK_SUBDOMAIN}.${TRAEFIK_HOST} (default subdomain "n8n" so folder name n8n-018u does not leak into DNS)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-https.rule=Host(`${TRAEFIK_SUBDOMAIN:-n8n}.${TRAEFIK_HOST}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-https.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-https.tls.certresolver=letsencrypt
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-https.service=${COMPOSE_PROJECT_NAME}
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-http.rule=Host(`${TRAEFIK_SUBDOMAIN:-n8n}.${TRAEFIK_HOST}`) && !PathPrefix(`/.well-known/acme-challenge`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-http.entrypoints=web
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-http.middlewares=${COMPOSE_PROJECT_NAME}-redirect-to-https
      - traefik.http.routers.${COMPOSE_PROJECT_NAME}-http.service=${COMPOSE_PROJECT_NAME}
      - traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-redirect-to-https.redirectscheme.permanent=true
      - traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=5678
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_HOST=${TRAEFIK_SUBDOMAIN:-n8n}.${TRAEFIK_HOST}
      - N8N_PROTOCOL=https
      - N8N_SECURE_COOKIE=true
      - WEBHOOK_URL=https://${TRAEFIK_SUBDOMAIN:-n8n}.${TRAEFIK_HOST}/
      - NODE_ENV=production
      - GENERIC_TIMEZONE=${TZ}
      - TZ=${TZ}
    volumes:
      - n8n_data:/home/node/.n8n

networks:
  traefik_proxy:
    external: true
    name: traefik_proxy

volumes:
  n8n_data:

