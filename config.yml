# Non-secret configuration (committed). Regenerate .env with: task system:export-config or task dev:export-config
project:
  name: sbs

proxy:
  acme_email: cloud_rust@gmx.de
auth:
  authentik:
    domain: auth.rust-infra.de

apps:
  n8n:
    domain: auto.rust-infra.de
    timezone: Europe/Berlin
  static:
    ai_consult:
      domain: rust-infra.de
    auth_demos:
      none:
        domain: auth-none.rust-infra.de
      forward:
        domain: auth-forward.rust-infra.de
      forward_ops:
        domain: auth-forward-ops.rust-infra.de
      oidc:
        domain: auth-oidc.rust-infra.de
        provider_slug: auth-oidc-demo
      jwt_api:
        domain: auth-jwt-api.rust-infra.de
        provider_slug: auth-jwt-api-demo
