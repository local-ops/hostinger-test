# Local dev only (gitignored). Used by task dev:export-config only (not on server).
#   task dev:setup
# or: cp config.secrets.local.example.yml config.secrets.local.yml
auth:
  authentik:
    postgres_password: local-dev-postgres
    secret_key: local-dev-secret-key-minimum-fifty-characters-long-ok
    bootstrap_email: admin@localhost
    bootstrap_password: local-akadmin-password
apps:
  static:
    auth_demos:
      oidc:
        client_id: auth-oidc-demo
        client_secret: local-dev-oidc-client-secret
        session_secret: local-dev-oidc-session-secret-32chars-ok
      jwt_api:
        client_id: auth-jwt-api-demo
        client_secret: local-dev-jwt-api-client-secret
      demo_users:
        demo_user_password: local-demo-password
        ops_user_password: local-ops-password
