services:
  authentik-server:
    image: ghcr.io/goauthentik/server:2025.6.4
    restart: unless-stopped
    networks:
      - default
      - traefik_proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_proxy
      - traefik.http.routers.sbs-authentik-https.rule=Host(`${AUTH_AUTHENTIK_DOMAIN}`)
      - traefik.http.routers.sbs-authentik-https.entrypoints=websecure
      - traefik.http.routers.sbs-authentik-https.tls.certresolver=letsencrypt
      - traefik.http.routers.sbs-authentik-https.service=sbs-authentik
      - traefik.http.routers.sbs-authentik-http.rule=Host(`${AUTH_AUTHENTIK_DOMAIN}`) && !PathPrefix(`/.well-known/acme-challenge`)
      - traefik.http.routers.sbs-authentik-http.entrypoints=web
      - traefik.http.routers.sbs-authentik-http.middlewares=sbs-authentik-redirect-to-https
      - traefik.http.routers.sbs-authentik-http.service=sbs-authentik
      - traefik.http.middlewares.sbs-authentik-redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.sbs-authentik-redirect-to-https.redirectscheme.permanent=true
      - traefik.http.services.sbs-authentik.loadbalancer.server.port=9000
      - traefik.http.middlewares.authentik-forwardauth.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik
      - traefik.http.middlewares.authentik-forwardauth.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authentik-forwardauth.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version
    command: server
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTH_AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTH_AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: false
      AUTH_AUTHENTIK_DOMAIN: ${AUTH_AUTHENTIK_DOMAIN}
    volumes:
      - ../data/auth/authentik/media:/media
      - ../data/auth/authentik/templates:/templates
      - ../config/auth/authentik/blueprints:/blueprints/custom:ro

  postgresql:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTH_AUTHENTIK_POSTGRES_PASSWORD}
      POSTGRES_DB: authentik
      AUTH_AUTHENTIK_POSTGRES_PASSWORD: ${AUTH_AUTHENTIK_POSTGRES_PASSWORD}
    volumes:
      - ../data/auth/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d authentik -U authentik"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - ../data/auth/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.6.4
    restart: unless-stopped
    command: worker
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTH_AUTHENTIK_POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTH_AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: false
      AUTH_AUTHENTIK_DOMAIN: ${AUTH_AUTHENTIK_DOMAIN}
      AUTH_AUTHENTIK_POSTGRES_PASSWORD: ${AUTH_AUTHENTIK_POSTGRES_PASSWORD}
      AUTH_AUTHENTIK_SECRET_KEY: ${AUTH_AUTHENTIK_SECRET_KEY}
    volumes:
      - ../data/auth/authentik/media:/media
      - ../data/auth/authentik/templates:/templates
      - ../config/auth/authentik/blueprints:/blueprints/custom:ro
